<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Calculadora Amazon CR</title><style>body{font-family:Arial;max-width:520px;margin:auto;padding:20px;background:#f3f4f6}.c{background:#fff;padding:15px;border-radius:12px}input,button{width:100%;padding:10px;margin:6px 0}button{background:#146eb4;color:#fff;border:0}#r{margin-top:10px}</style></head><body><div class='c'><h2>Calculadora Amazon CR</h2><p>HH:MM</p><input id='e' placeholder='Horas extra'><input id='f' placeholder='Horas feriado'><input id='ef' placeholder='Extra feriado'><input id='b' placeholder='Boot'><input id='bo' placeholder='Boot OT'><button onclick='calc()'>Calcular</button><div id='r'></div></div><script>const rate=3679.49;function h(v){if(!v)return 0;let p=v.split(':');return (+p[0]||0)+((+p[1]||0)/60)}function renta(br){let m=br*2,t=0;if(m>918000){let e=Math.min(m,1347000)-918000;if(e>0)t+=e*.1;if(m>1347000){e=Math.min(m,2364000)-1347000;if(e>0)t+=e*.15}if(m>2364000){e=Math.min(m,4727000)-2364000;if(e>0)t+=e*.2}if(m>4727000)t+=(m-4727000)*.25}return t/2}function fmt(n){return n.toLocaleString('es-CR',{style:'currency',currency:'CRC'})}function calc(){let br=120*rate+h(e.value)*rate*1.5+h(f.value)*rate+h(ef.value)*rate*3+h(b.value)*rate+h(bo.value)*rate*1.5;let c=br*.1083,a=br*.05,rn=renta(br),n=br-c-a-rn;document.getElementById('r').innerHTML='Bruto: '+fmt(br)+'<br>CCSS: '+fmt(c)+'<br>Asociación: '+fmt(a)+'<br>Renta: '+fmt(rn)+'<hr><b>Neto: '+fmt(n)+'</b>'}</script></body></html>
